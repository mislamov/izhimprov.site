<!doctype html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Fullscreen Timer</title>
  <style>
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      background: #05070d;
      -webkit-user-select: none;
      user-select: none;
    }
    #timer-host {
      width: 100%;
      height: 100%;
    }
  </style>
</head>
<body>
  <div id="timer-host"></div>

  <script>
    const host = document.getElementById("timer-host");
    const shadow = host.attachShadow({ mode: "open" });

    shadow.innerHTML = `
      <style>
        :host {
          display: block;
          width: 100%;
          height: 100%;
          color-scheme: dark;
          -webkit-user-select: none;
          user-select: none;
        }

        .fullscreen-timer-container {
          --timer-bg-c1: #1f2937;
          --timer-bg-c2: #0b1220;
          --timer-bg-c3: #05070d;
          --timer-text-color: #e5e7eb;
          --timer-ring-color: rgba(229, 231, 235, 0.07);
          --timer-font-scale: 1;
          --control-bg: rgba(9, 13, 22, 0.34);
          --control-bg-hover: rgba(15, 23, 36, 0.5);

          position: relative;
          min-height: 100vh;
          min-height: 100dvh;
          height: 100vh;
          height: 100dvh;
          display: grid;
          place-items: center;
          overflow: hidden;
          background: radial-gradient(
            circle at 30% 20%,
            var(--timer-bg-c1) 0%,
            var(--timer-bg-c2) 55%,
            var(--timer-bg-c3) 100%
          );
          font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
          color: var(--timer-text-color);
          box-sizing: border-box;
          -webkit-user-select: none;
          user-select: none;
        }

        .fullscreen-timer-container *,
        .fullscreen-timer-container *::before,
        .fullscreen-timer-container *::after {
          box-sizing: border-box;
        }

        .bg-pulse {
          position: fixed;
          inset: 0;
          pointer-events: none;
          background: radial-gradient(circle at 50% 50%, rgba(251, 146, 60, 0.35) 0%, rgba(127, 29, 29, 0.45) 55%, rgba(17, 24, 39, 0) 100%);
          opacity: 0;
          z-index: 0;
        }

        .fullscreen-timer-container.is-overtime .bg-pulse {
          animation: bg-pulse 0.7s infinite alternate;
        }

        @keyframes bg-pulse {
          from { opacity: 0.16; }
          to { opacity: 0.48; }
        }

        .timer-wrap {
          position: relative;
          z-index: 1;
          display: grid;
          justify-items: center;
          gap: 1.2rem;
          isolation: isolate;
        }

        .progress-ring {
          position: fixed;
          left: 50%;
          top: 50%;
          transform: translate(-50%, -50%);
          width: min(75vmin, min(80vh, 920px));
          height: min(75vmin, min(80vh, 920px));
          border-radius: 50%;
          background: conic-gradient(
            from 0deg at 50% 50%,
            var(--timer-ring-color) 0deg var(--progress-deg, 360deg),
            transparent var(--progress-deg, 360deg) 360deg
          );
          -webkit-mask: radial-gradient(circle, transparent calc(50% - 14px), #000 calc(50% - 13px));
          mask: radial-gradient(circle, transparent calc(50% - 14px), #000 calc(50% - 13px));
          z-index: 0;
          pointer-events: none;
          filter: drop-shadow(0 10px 28px rgba(0, 0, 0, 0.25));
        }

        .progress-ring::before {
          content: "";
          position: absolute;
          inset: 0;
          border-radius: 50%;
          border: 2px solid rgba(229, 231, 235, 0.06);
        }

        .timer {
          position: relative;
          z-index: 1;
          display: inline-block;
          font-size: calc(clamp(4rem, 25vw, 28rem) * var(--timer-font-scale));
          font-weight: 700;
          letter-spacing: 0.04em;
          line-height: 1;
          font-variant-numeric: tabular-nums;
          user-select: none;
          text-shadow: 0 8px 40px rgba(0, 0, 0, 0.45);
        }

        .minutes {
          display: block;
          color: #f3f4f6;
          text-align: center;
        }

        .minutes-sign {
          margin-right: 0.02em;
        }

        .minutes-leading {
          opacity: 0.42;
        }

        .seconds {
          position: absolute;
          left: 100%;
          top: 0;
          font-size: 0.45em;
          opacity: 0.52;
          line-height: 1;
          margin-left: 0.08em;
        }

        .timer.urgent {
          display: inline-flex;
          align-items: flex-start;
          justify-content: center;
        }

        .timer.urgent .minutes {
          display: inline;
          text-align: left;
          font-size: 1.22em;
        }

        .timer.urgent .seconds {
          position: static;
          font-size: 0.82em;
          opacity: 1;
          margin-left: 0.04em;
          align-self: flex-start;
          line-height: 1;
        }

        .timer.overtime {
          font-size: calc(clamp(3rem, 18vw, 17rem) * var(--timer-font-scale));
        }

        .play-btn {
          position: absolute;
          left: 50%;
          top: 50%;
          transform: translate(-50%, -50%);
          width: clamp(60px, 8vw, 86px);
          height: clamp(60px, 8vw, 86px);
          border-radius: 50%;
          border: 2px solid rgba(229, 231, 235, 0.6);
          background: var(--control-bg);
          color: #e5e7eb;
          display: flex;
          align-items: center;
          justify-content: center;
          cursor: pointer;
          transition: transform 120ms ease, background 120ms ease;
          pointer-events: auto;
          -webkit-tap-highlight-color: transparent;
          z-index: 10;
          margin: 0;
          padding: 0;
        }

        .play-btn:hover {
          background: var(--control-bg-hover);
          transform: translate(-50%, -50%) scale(1.03);
        }

        .play-btn[hidden] {
          display: none;
        }

        .play-icon {
          width: clamp(20px, 3vw, 28px);
          height: clamp(20px, 3vw, 28px);
          pointer-events: none;
        }

        .controls {
          position: fixed;
          right: clamp(0.5rem, 2vw, 1rem);
          bottom: clamp(0.5rem, 2vw, 1rem);
          z-index: 2;
        }

        .left-controls {
          position: fixed;
          left: clamp(0.5rem, 2vw, 1rem);
          bottom: clamp(0.5rem, 2vw, 1rem);
          z-index: 2;
          display: flex;
          gap: 0.45rem;
        }

        .top-controls {
          position: fixed;
          right: clamp(0.5rem, 2vw, 1rem);
          top: clamp(0.5rem, 2vw, 1rem);
          z-index: 2;
        }

        .btn {
          border: 0;
          border-radius: 999px;
          padding: clamp(0.5rem, 1.5vw, 0.7rem) clamp(0.8rem, 2.5vw, 1rem);
          font-size: clamp(0.8rem, 2.5vw, 0.95rem);
          font-weight: 600;
          cursor: pointer;
          color: #e5e7eb;
          background: var(--control-bg);
          backdrop-filter: blur(5px);
          box-shadow: 0 4px 20px rgba(0, 0, 0, 0.35);
        }

        .btn:hover {
          background: var(--control-bg-hover);
        }

        .icon-btn {
          width: clamp(2.2rem, 5vw, 2.8rem);
          height: clamp(2.2rem, 5vw, 2.8rem);
          border: 0;
          border-radius: 999px;
          display: flex;
          align-items: center;
          justify-content: center;
          cursor: pointer;
          color: #e5e7eb;
          background: var(--control-bg);
          backdrop-filter: blur(5px);
          box-shadow: 0 4px 20px rgba(0, 0, 0, 0.35);
          padding: 0;
        }

        .icon-btn:hover {
          background: var(--control-bg-hover);
        }

        .icon-btn svg {
          width: clamp(1rem, 2.6vw, 1.25rem);
          height: clamp(1rem, 2.6vw, 1.25rem);
        }

        .controls,
        .left-controls,
        .top-controls,
        .play-btn {
          transition: opacity 180ms ease;
        }

        .fullscreen-timer-container.controls-hidden .controls,
        .fullscreen-timer-container.controls-hidden .left-controls,
        .fullscreen-timer-container.controls-hidden .top-controls,
        .fullscreen-timer-container.controls-hidden .play-btn {
          opacity: 0;
          pointer-events: none;
        }

        @media (max-width: 768px) {
          .progress-ring {
            width: min(70vmin, min(75vh, 600px));
            height: min(70vmin, min(75vh, 600px));
            -webkit-mask: radial-gradient(circle, transparent calc(50% - 10px), #000 calc(50% - 9px));
            mask: radial-gradient(circle, transparent calc(50% - 10px), #000 calc(50% - 9px));
          }
          .timer { font-size: calc(clamp(3.5rem, 22vw, 20rem) * var(--timer-font-scale)); }
          .timer.overtime { font-size: calc(clamp(2.5rem, 16vw, 14rem) * var(--timer-font-scale)); }
          .timer-wrap { gap: 1rem; }
          .play-btn { width: 2.8rem; height: 2.8rem; }
          .btn {
            padding: 0.38rem 0.62rem;
            font-size: 0.72rem;
          }
          .icon-btn { width: 1.75rem; height: 1.75rem; font-size: 0.82rem; }
          .icon-btn svg {
            width: 0.8rem;
            height: 0.8rem;
          }
        }

        @media (max-width: 480px) {
          .progress-ring {
            width: min(65vmin, min(70vh, 400px));
            height: min(65vmin, min(70vh, 400px));
            -webkit-mask: radial-gradient(circle, transparent calc(50% - 8px), #000 calc(50% - 7px));
            mask: radial-gradient(circle, transparent calc(50% - 8px), #000 calc(50% - 7px));
          }
          .timer { font-size: calc(clamp(3rem, 20vw, 16rem) * var(--timer-font-scale)); }
          .timer.overtime { font-size: calc(clamp(2rem, 14vw, 12rem) * var(--timer-font-scale)); }
          .play-btn { width: 2.35rem; height: 2.35rem; }
          .timer-wrap { gap: 0.8rem; }
          .seconds { font-size: 0.4em; margin-left: 0.05em; }
          .btn {
            padding: 0.32rem 0.52rem;
            font-size: 0.64rem;
          }
          .icon-btn { width: 1.5rem; height: 1.5rem; font-size: 0.72rem; }
          .icon-btn svg {
            width: 0.68rem;
            height: 0.68rem;
          }
        }

        @media (max-height: 500px) and (orientation: landscape) {
          .progress-ring {
            width: min(60vmin, min(90vh, 500px));
            height: min(60vmin, min(90vh, 500px));
          }
          .timer { font-size: calc(clamp(2.5rem, 15vh, 12rem) * var(--timer-font-scale)); }
          .timer.overtime { font-size: calc(clamp(2rem, 12vh, 10rem) * var(--timer-font-scale)); }
          .timer-wrap { gap: 0.6rem; }
        }
      </style>

        <div class="fullscreen-timer-container" id="container">
        <div class="bg-pulse" aria-hidden="true"></div>
        <main class="timer-wrap">
          <div class="progress-ring" id="progressRing" aria-hidden="true"></div>
          <div class="timer" id="timer">
            <span class="minutes" id="minutes"><span class="minutes-sign" id="minutesSign"></span><span class="minutes-leading" id="minutesLeading"></span><span id="minutesMain">30</span></span><span class="seconds" id="seconds">:00</span>
          </div>
          <button class="play-btn" id="playBtn" type="button" aria-label="Play">
            <svg class="play-icon" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
              <polygon points="5,3 19,12 5,21"></polygon>
            </svg>
          </button>
        </main>
        <div class="controls">
          <button class="btn" id="setTimerBtn" type="button">--:--</button>
        </div>
        <div class="left-controls">
          <button class="icon-btn" id="fontMinusBtn" type="button" aria-label="Decrease timer font" title="Decrease timer font">-</button>
          <button class="icon-btn" id="fontPlusBtn" type="button" aria-label="Increase timer font" title="Increase timer font">+</button>
        </div>
        <div class="top-controls">
          <button class="icon-btn" id="fullscreenBtn" type="button" aria-label="Toggle fullscreen" title="Toggle fullscreen">
            <svg id="fullscreenIcon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
              <path d="M8 3H3v5M16 3h5v5M8 21H3v-5M16 21h5v-5"/>
            </svg>
          </button>
        </div>
      </div>
    `;

    const STORAGE_KEY = "fullscreen-timer-state-v2";
    const LEGACY_END_TS_KEY = "fullscreen-timer-end-ts";
    const FONT_SCALE_KEY = "fullscreen-timer-font-scale-v1";
    const DEFAULT_DURATION_MS = 30 * 60 * 1000;
    const DEFAULT_FONT_SCALE = 1;
    const MIN_FONT_SCALE = 0.6;
    const MAX_FONT_SCALE = 2.4;
    const FONT_SCALE_STEP = 0.05;
    const CONTROLS_IDLE_HIDE_MS = 4000;

    const containerEl = shadow.getElementById("container");
    const timerEl = shadow.getElementById("timer");
    const minutesSignEl = shadow.getElementById("minutesSign");
    const minutesLeadingEl = shadow.getElementById("minutesLeading");
    const minutesMainEl = shadow.getElementById("minutesMain");
    const secondsEl = shadow.getElementById("seconds");
    const playBtn = shadow.getElementById("playBtn");
    const setTimerBtn = shadow.getElementById("setTimerBtn");
    const fontMinusBtn = shadow.getElementById("fontMinusBtn");
    const fontPlusBtn = shadow.getElementById("fontPlusBtn");
    const fullscreenBtn = shadow.getElementById("fullscreenBtn");
    const fullscreenIcon = shadow.getElementById("fullscreenIcon");
    const progressRing = shadow.getElementById("progressRing");
    let fontScale = DEFAULT_FONT_SCALE;
    let controlsHideTimer = null;

    function formatTime(totalMs) {
      const isNegative = totalMs < 0;
      const totalSeconds = Math.ceil(Math.abs(totalMs) / 1000);
      const minutes = Math.floor(totalSeconds / 60);
      const seconds = totalSeconds % 60;
      return {
        sign: isNegative ? "-" : "",
        minutesLeading: minutes < 10 ? "0" : "",
        minutesMain: String(minutes),
        seconds: ":" + String(seconds).padStart(2, "0")
      };
    }

    function writeState(next) {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(next));
    }

    function clamp(value, min, max) {
      return Math.min(max, Math.max(min, value));
    }

    function loadFontScale() {
      const raw = Number(localStorage.getItem(FONT_SCALE_KEY));
      if (!Number.isFinite(raw)) return DEFAULT_FONT_SCALE;
      return clamp(raw, MIN_FONT_SCALE, MAX_FONT_SCALE);
    }

    function applyFontScale(nextScale) {
      fontScale = clamp(nextScale, MIN_FONT_SCALE, MAX_FONT_SCALE);
      containerEl.style.setProperty("--timer-font-scale", String(fontScale));
      localStorage.setItem(FONT_SCALE_KEY, String(fontScale));
    }

    function setControlsVisible(visible) {
      containerEl.classList.toggle("controls-hidden", !visible);
    }

    function isControlsVisible() {
      return !containerEl.classList.contains("controls-hidden");
    }

    function hideControlsNow() {
      if (controlsHideTimer !== null) {
        clearTimeout(controlsHideTimer);
        controlsHideTimer = null;
      }
      setControlsVisible(false);
    }

    function scheduleControlsAutoHide() {
      if (controlsHideTimer !== null) {
        clearTimeout(controlsHideTimer);
      }
      controlsHideTimer = setTimeout(function () {
        setControlsVisible(false);
      }, CONTROLS_IDLE_HIDE_MS);
    }

    function registerUserActivity() {
      setControlsVisible(true);
      scheduleControlsAutoHide();
    }

    function isTapOnControl(target) {
      return !!target.closest(".controls, .left-controls, .top-controls, .play-btn, .btn, .icon-btn");
    }

    function handleTouchToggle(event) {
      const target = event.target;
      if (!(target instanceof Element)) return;
      if (isTapOnControl(target)) {
        registerUserActivity();
        return;
      }
      if (isControlsVisible()) {
        hideControlsNow();
      } else {
        registerUserActivity();
      }
    }

    function bindHoldRepeat(buttonEl, action) {
      let timeoutId = null;
      let intervalId = null;

      function clearTimers() {
        if (timeoutId !== null) {
          clearTimeout(timeoutId);
          timeoutId = null;
        }
        if (intervalId !== null) {
          clearInterval(intervalId);
          intervalId = null;
        }
      }

      function start() {
        action();
        clearTimers();
        timeoutId = setTimeout(function () {
          intervalId = setInterval(action, 70);
        }, 260);
      }

      buttonEl.addEventListener("pointerdown", function (e) {
        if (e.button !== 0) return;
        start();
      });
      buttonEl.addEventListener("pointerup", clearTimers);
      buttonEl.addEventListener("pointerleave", clearTimers);
      buttonEl.addEventListener("pointercancel", clearTimers);
      buttonEl.addEventListener("lostpointercapture", clearTimers);
      buttonEl.addEventListener("contextmenu", function (e) { e.preventDefault(); });
    }

    function readState() {
      const now = Date.now();
      const raw = localStorage.getItem(STORAGE_KEY);
      if (raw) {
        try {
          const parsed = JSON.parse(raw);
          if (parsed && parsed.mode === "running" && Number.isFinite(parsed.endTimestamp) && Number.isFinite(parsed.totalDurationMs) && parsed.totalDurationMs > 0) {
            return { mode: "running", endTimestamp: parsed.endTimestamp, totalDurationMs: parsed.totalDurationMs };
          }
          if (parsed && parsed.mode === "paused" && Number.isFinite(parsed.remainingMs) && parsed.remainingMs > 0 && Number.isFinite(parsed.totalDurationMs) && parsed.totalDurationMs > 0) {
            return { mode: "paused", remainingMs: parsed.remainingMs, totalDurationMs: parsed.totalDurationMs };
          }
        } catch (_) {}
      }

      const legacyEndTs = Number(localStorage.getItem(LEGACY_END_TS_KEY));
      if (Number.isFinite(legacyEndTs) && legacyEndTs > now) {
        const remainingMs = legacyEndTs - now;
        const migrated = { mode: "running", endTimestamp: legacyEndTs, totalDurationMs: remainingMs };
        writeState(migrated);
        localStorage.removeItem(LEGACY_END_TS_KEY);
        return migrated;
      }

      const initial = { mode: "running", endTimestamp: now + DEFAULT_DURATION_MS, totalDurationMs: DEFAULT_DURATION_MS };
      writeState(initial);
      return initial;
    }

    function parseDurationInput(raw) {
      if (!raw) return null;
      const value = raw.trim();
      if (!value) return null;
      if (/^\d+$/.test(value)) {
        const minutes = Number(value);
        return minutes > 0 ? minutes * 60 * 1000 : null;
      }
      const mmss = value.match(/^(\d{1,3}):([0-5]\d)$/);
      if (!mmss) return null;
      const totalMs = (Number(mmss[1]) * 60 + Number(mmss[2])) * 1000;
      return totalMs > 0 ? totalMs : null;
    }

    function startNewCountdown(durationMs) {
      timerState = { mode: "paused", remainingMs: durationMs, totalDurationMs: durationMs };
      writeState(timerState);
      tick();
    }

    function startFromPause() {
      if (!timerState || timerState.mode !== "paused") return;
      timerState = { mode: "running", endTimestamp: Date.now() + timerState.remainingMs, totalDurationMs: timerState.totalDurationMs };
      writeState(timerState);
      tick();
    }

    let timerState = readState();

    function tick() {
      const now = Date.now();
      const remaining = timerState.mode === "running" ? (timerState.endTimestamp - now) : timerState.remainingMs;
      const formatted = formatTime(remaining);

      minutesSignEl.textContent = formatted.sign;
      minutesLeadingEl.textContent = formatted.minutesLeading;
      minutesMainEl.textContent = formatted.minutesMain;
      secondsEl.textContent = formatted.seconds;

      playBtn.hidden = !(timerState.mode === "paused" && remaining > 0);
      const isUrgent = remaining > 0 && remaining < 5 * 60 * 1000;
      const isOvertime = remaining < 0;
      timerEl.classList.toggle("urgent", isUrgent);
      timerEl.classList.toggle("overtime", isOvertime);
      containerEl.classList.toggle("is-overtime", isOvertime);

      const total = timerState.totalDurationMs > 0 ? timerState.totalDurationMs : DEFAULT_DURATION_MS;
      const progress = Math.max(0, Math.min(1, remaining / total));
      progressRing.style.setProperty("--progress-deg", String((1 - progress) * 360) + "deg");
      containerEl.style.setProperty("--timer-ring-color", remaining > 0 && remaining < 2 * 60 * 1000 ? "rgba(251, 146, 60, 0.24)" : "rgba(229, 231, 235, 0.07)");

      if (isOvertime) {
        containerEl.style.setProperty("--timer-bg-c1", "#6b2d14");
        containerEl.style.setProperty("--timer-bg-c2", "#2f120b");
        containerEl.style.setProperty("--timer-bg-c3", "#140906");
      } else if (remaining > 0 && remaining < 2 * 60 * 1000) {
        containerEl.style.setProperty("--timer-bg-c1", "#7c2d12");
        containerEl.style.setProperty("--timer-bg-c2", "#4a1d0f");
        containerEl.style.setProperty("--timer-bg-c3", "#1f0f0a");
      } else {
        containerEl.style.setProperty("--timer-bg-c1", "#1f2937");
        containerEl.style.setProperty("--timer-bg-c2", "#0b1220");
        containerEl.style.setProperty("--timer-bg-c3", "#05070d");
      }
    }

    function renderFullscreenIcon() {
      const isFs = !!document.fullscreenElement;
      fullscreenIcon.innerHTML = isFs
        ? '<path d="M4 9h5V4M20 9h-5V4M4 15h5v5M20 15h-5v5"/>'
        : '<path d="M8 3H3v5M16 3h5v5M8 21H3v-5M16 21h5v-5"/>';
      fullscreenBtn.setAttribute("aria-label", isFs ? "Exit fullscreen" : "Enter fullscreen");
      fullscreenBtn.setAttribute("title", isFs ? "Exit fullscreen" : "Enter fullscreen");
    }

    async function toggleFullscreen() {
      try {
        if (document.fullscreenElement) {
          await document.exitFullscreen();
        } else {
          await document.documentElement.requestFullscreen();
        }
      } catch (_) {}
    }

    tick();
    applyFontScale(loadFontScale());
    renderFullscreenIcon();
    registerUserActivity();
    setInterval(tick, 250);
    playBtn.addEventListener("click", startFromPause);
    bindHoldRepeat(fontMinusBtn, function () { applyFontScale(fontScale - FONT_SCALE_STEP); });
    bindHoldRepeat(fontPlusBtn, function () { applyFontScale(fontScale + FONT_SCALE_STEP); });
    fullscreenBtn.addEventListener("click", toggleFullscreen);
    document.addEventListener("fullscreenchange", renderFullscreenIcon);
    containerEl.addEventListener("touchstart", handleTouchToggle, { passive: true });
    document.addEventListener("mousemove", registerUserActivity, { passive: true });
    document.addEventListener("mousedown", registerUserActivity, { passive: true });
    document.addEventListener("wheel", registerUserActivity, { passive: true });
    document.addEventListener("keydown", registerUserActivity);
    setTimerBtn.addEventListener("click", function () {
      const raw = prompt("Введите минуты (например 25) или формат MM:SS", "30:00");
      const duration = parseDurationInput(raw);
      if (!duration) return;
      startNewCountdown(duration);
    });
  </script>
</body>
</html>
